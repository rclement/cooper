<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Cooper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <header>
      <div class="brand">
        <span class="brand-name">Agent Cooper</span>
        <span class="brand-tagline">...damn good agent</span>
      </div>
      <button id="settings-btn" class="btn-ghost" title="Settings">⚙ Settings</button>
    </header>

    <div id="settings-panel" class="hidden">
      <div class="settings-inner">
        <div class="field-row">
          <label for="base-url">Provider URL</label>
          <input id="base-url" type="text" placeholder="http://localhost:11434/v1" spellcheck="false" autocomplete="off">
        </div>
        <div class="field-row">
          <label for="api-key">API Key</label>
          <input id="api-key" type="password" placeholder="ollama" autocomplete="off">
        </div>
        <div class="field-row">
          <label for="model">Model</label>
          <input id="model" type="text" placeholder="qwen3:latest" spellcheck="false" autocomplete="off">
        </div>
        <div class="field-row field-row--tall">
          <label for="system-prompt">System Prompt</label>
          <textarea id="system-prompt" rows="2" placeholder="You are a helpful AI assistant."></textarea>
        </div>
        <div class="settings-footer">
          <button id="settings-save" class="btn-primary">Save &amp; Close</button>
        </div>
      </div>
    </div>

    <div id="messages">
      <div id="welcome" class="empty-state">
        <div class="empty-owl">🦉</div>
        <p>Set your provider in <strong>Settings</strong>, then ask anything.</p>
        <p class="empty-hint">Runs entirely in your browser — keys never leave this page.</p>
      </div>
    </div>

    <div id="input-bar">
      <textarea
        id="prompt-input"
        placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
        rows="1"
        disabled
      ></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>

  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
