name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup update stable && rustup default stable
          rustup component add llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check linting
        run: cargo clippy --all-targets

      - name: Test with coverage
        run: |
          cargo cov --all-targets --no-report
          cargo cov-report --json --summary-only --output-path coverage.json
          cargo cov-report --cobertura --output-path cobertura.xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.json
            cobertura.xml

  coverage:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: actions/download-artifact@v4
        with:
          name: coverage-reports

      - name: Build coverage table
        run: |
          {
            echo "# Code coverage"
            echo
            echo "| File | Lines | Functions | Regions |"
            echo "| --- | --- | --- | --- |"
            jq -r --arg root "$GITHUB_WORKSPACE/" '
              .data[0].files[]
              | "| \(.filename | sub("^" + $root; "")) | \(.summary.lines.percent | round)% (\(.summary.lines.covered)/\(.summary.lines.count)) | \(.summary.functions.percent | round)% (\(.summary.functions.covered)/\(.summary.functions.count)) | \(.summary.regions.percent | round)% (\(.summary.regions.covered)/\(.summary.regions.count)) |"
            ' coverage.json
            total_lines=$(jq -r '.data[0].totals.lines.percent | round' coverage.json)
            total_functions=$(jq -r '.data[0].totals.functions.percent | round' coverage.json)
            total_regions=$(jq -r '.data[0].totals.regions.percent | round' coverage.json)
            echo "| **Total** | **${total_lines}%** | **${total_functions}%** | **${total_regions}%** |"
          } > coverage-summary.md

      # - name: Compute diff coverage with target branch
      #   if: github.event_name == 'pull_request'
      #   env:
      #     TARGET_BRANCH: origin/${{ github.event.pull_request.base.ref }}
      #   run: |
      #     uvx diff-cover --compare-branch "$TARGET_BRANCH" --diff-range-notation '..' \
      #       --ignore-staged --ignore-unstaged \
      #       --format markdown:diff-coverage.md \
      #       cobertura.xml
      #     cat diff-coverage.md >> coverage-summary.md

      - name: Write to job summary
        run: cat coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: coverage-summary.md

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - uses: Swatinem/rust-cache@v2

      - uses: jetli/wasm-pack-action@v0.4.0

      - name: Build
        run: cargo build

      - name: Run e2e tests
        run: cargo test -p cooper-e2e -j 1

  build:
    needs: e2e
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - uses: Swatinem/rust-cache@v2

      - name: Build application
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: agent-cooper-${{ matrix.name }}
          path: target/release/agent-cooper
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Decide whether the image can be pushed
        id: gate
        run: echo "push=${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: steps.gate.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/cooper
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.gate.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: ${{ github.event_name == 'push' && 'production' || format('preview-pr-{0}', github.event.number) }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate the Vercel dockerfile
        run: echo "FROM ghcr.io/${{ github.repository_owner }}/cooper:sha-${GITHUB_SHA}" > Dockerfile.vercel

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          url=$(npx vercel@latest deploy --yes ${{ github.event_name == 'push' && '--prod' || '' }} --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
